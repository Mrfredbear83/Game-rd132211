<!DOCTYPE html>
<html>
<head>
  <title>Game</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 6px;
      height: 6px;
      background: black;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ================= TEXTURES (FIXED SAFE SOURCES) =================
const loader = new THREE.TextureLoader();

const grassTex = loader.load("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQU_KBFl4MCIVubdKbytb_P1YgxIgcxJ7QkTg&s");
const stoneTex = loader.load("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSaLp9ocJqlmPFJL8n7tdSqmhvfcxICicrKWg&s");

grassTex.magFilter = THREE.NearestFilter;
stoneTex.magFilter = THREE.NearestFilter;

// ================= MATERIALS =================
const materials = [
  new THREE.MeshLambertMaterial({ map: grassTex }),
  new THREE.MeshLambertMaterial({ map: stoneTex })
];

// ================= LIGHT =================
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(2, 5, 2);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.2);
scene.add(ambient);
// ================= SETTINGS =================
const BLOCK_SIZE = 0.9;
const WORLD_SIZE = 10;
const STONE_DEPTH = 7;

const PLAYER = {
  width: 0.1,
  height: 4.8
};

const blockGeo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);

// ================= BLOCK STORAGE =================
const blocks = new Map();
const meshes = [];

function key(x, y, z) {
  return `${Math.round(x)},${Math.round(y)},${Math.round(z)}`;
}

let selectedBlock = 1;

// ================= BLOCK FUNCTIONS =================
function createBlock(x, y, z, mat) {
  const cube = new THREE.Mesh(blockGeo, materials[mat]);
  cube.position.set(x, y, z);
  scene.add(cube);

  blocks.set(key(x, y, z), cube);
  meshes.push(cube);
  return cube;
}

function removeBlock(mesh) {
  scene.remove(mesh);
  blocks.delete(key(mesh.position.x, mesh.position.y, mesh.position.z));

  const i = meshes.indexOf(mesh);
  if (i !== -1) meshes.splice(i, 1);
}

// ================= WORLD =================
for (let x = -WORLD_SIZE; x <= WORLD_SIZE; x++) {
  for (let z = -WORLD_SIZE; z <= WORLD_SIZE; z++) {

    for (let y = 0; y < STONE_DEPTH; y++) {
      createBlock(x * BLOCK_SIZE, y * BLOCK_SIZE, z * BLOCK_SIZE, 1);
    }

    createBlock(x * BLOCK_SIZE, STONE_DEPTH * BLOCK_SIZE, z * BLOCK_SIZE, 0);
  }
}

// ================= PLAYER =================
const spawnPoint = new THREE.Vector3(0, 30, 0);

// REAL player position (feet)
const playerPos = new THREE.Vector3().copy(spawnPoint);

const EYE_HEIGHT = 1.6;

camera.position.set(
  playerPos.x,
  playerPos.y + EYE_HEIGHT,
  playerPos.z
);

let velocityY = 0;
const gravity = -0.02;
let onGround = true;
// ================= INPUT =================
const keys = {};

document.addEventListener('keydown', e => {
  keys[e.code] = true;

  if (e.code === 'Digit1') selectedBlock = 0;
  if (e.code === 'Digit2') selectedBlock = 1;
});

document.addEventListener('keyup', e => {
  keys[e.code] = false;
});
document.addEventListener('keydown', (e) => {
  if (e.code === 'KeyR') {
    respawn();
  }
});

function respawn() {
  playerPos.copy(spawnPoint);
  velocityY = 0;
  onGround = false;

  camera.position.set(
    playerPos.x,
    playerPos.y + EYE_HEIGHT,
    playerPos.z
  );
}
// ================= LOOK =================
let yaw = 0, pitch = 0;

document.body.addEventListener('mousemove', e => {
  if (document.pointerLockElement === document.body) {
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
  }
});

document.body.addEventListener('click', () => {
  document.body.requestPointerLock();
});

// ================= COLLISION =================
function intersects(px, py, pz) {

  const minX = px - PLAYER.width / 2;
  const maxX = px + PLAYER.width / 2;
  const minY = py;
  const maxY = py + PLAYER.height;
  const minZ = pz - PLAYER.width / 2;
  const maxZ = pz + PLAYER.width / 2;

  const startX = Math.floor(minX);
  const endX = Math.floor(maxX);
  const startY = Math.floor(minY);
  const endY = Math.floor(maxY);
  const startZ = Math.floor(minZ);
  const endZ = Math.floor(maxZ);

  for (let x = startX; x <= endX; x++) {
    for (let y = startY; y <= endY; y++) {
      for (let z = startZ; z <= endZ; z++) {

        if (blocks.has(`${x},${y},${z}`)) {
          return true;
        }
      }
    }
  }

  return false;
}


// ================= MOVEMENT =================
function moveAxis(dx, dy, dz) {

  // X
  if (!intersects(playerPos.x + dx, playerPos.y, playerPos.z)) {
    playerPos.x += dx;
  }

  // Z
  if (!intersects(playerPos.x, playerPos.y, playerPos.z + dz)) {
    playerPos.z += dz;
  }

  // Y
  if (!intersects(playerPos.x, playerPos.y + dy, playerPos.z)) {
    playerPos.y += dy;
    onGround = false;
  } else {
    velocityY = 0;
    onGround = true;
  }

  // sync camera (IMPORTANT)
  camera.position.set(
    playerPos.x,
    playerPos.y + EYE_HEIGHT,
    playerPos.z
  );
}
// ================= UPDATE =================
function updateMovement() {

  const speed = 0.10;

  const forward = new THREE.Vector3(
    -Math.sin(yaw),
    0,
    -Math.cos(yaw)
  );

  const right = new THREE.Vector3(
    forward.z,
    0,
    -forward.x
  );

  let dx = 0, dz = 0;

  if (keys['KeyW']) { dx += forward.x * speed; dz += forward.z * speed; }
  if (keys['KeyS']) { dx -= forward.x * speed; dz -= forward.z * speed; }
  if (keys['KeyA']) { dx -= right.x * speed; dz -= right.z * speed; }
  if (keys['KeyD']) { dx += right.x * speed; dz += right.z * speed; }

  velocityY += gravity;

  if (keys['Space'] && onGround) {
    velocityY = 0.35;
    onGround = false;
  }

  moveAxis(dx, velocityY, dz);

  camera.rotation.order = "YXZ";
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;
}

// ================= RAYCAST =================
const raycaster = new THREE.Raycaster();
raycaster.far = 4;

document.addEventListener('mousedown', (e) => {

  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const hits = raycaster.intersectObjects(meshes);

  if (!hits.length) return;

  const hit = hits[0];
  const block = hit.object;

  if (e.button === 0) {
    removeBlock(block);
  }

  if (e.button === 2) {

    const normal = hit.face.normal.clone();
    const pos = block.position.clone().add(normal.multiplyScalar(BLOCK_SIZE));

    const k = key(pos.x, pos.y, pos.z);

    if (!blocks.has(k)) {
      createBlock(pos.x, pos.y, pos.z, selectedBlock);
    }
  }
});

window.addEventListener("contextmenu", e => e.preventDefault());

// ================= LOOP =================
function animate() {
  requestAnimationFrame(animate);
  updateMovement();
  renderer.render(scene, camera);
}
animate();

// ================= RESIZE =================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
